<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-SCANNER</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23121b30'/><text x='50' y='70' font-size='70' text-anchor='middle' fill='%23608cff' font-family='Arial' font-weight='bold'>NEO</text></svg>">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-database"></i> NEO·EXCEL SCANNER</h1>
        <div class="sub">
            <i class="fas fa-cogs"></i> Extraer Código | Teléfono · Búsqueda Centralizada · Sin Duplicados
        </div>

        <div class="file-area">
            <label for="excelFiles" class="file-label">
                <i class="fas fa-cloud-upload-alt"></i> Cargar archivos .xlsx
            </label>
            <input type="file" id="excelFiles" accept=".xlsx, .xls" multiple>
            <span class="status-badge" id="status"><i class="fas fa-circle-notch"></i> Listo para procesar</span>
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar por Código o Teléfono en la base de datos...">
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>📁 Archivo</th>
                        
                        <th>📊 Código</th>
                        <th>🎯 Teléfono</th>
                        <th>📅 Fecha Carga</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" class="empty-message">Carga archivos o realiza una búsqueda</td></tr>
                </tbody>
            </table>
        </div>

        <div class="count-info" id="counter">
            <i class="fas fa-microchip"></i> <span id="rowCount">0</span> registros únicos en vista
        </div>
    </div>

    <script src="js/excel-logic.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
